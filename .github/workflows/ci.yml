name: ci

# Least-privilege token: lint/test only ever need to read the repo contents.
permissions:
  contents: read

# Pre-merge gate. `pull_request` is what makes it one: without it a fork PR would run the
# real-Postgres proofs (concurrency-proof.yml triggers on pull_request) while lint, tests,
# and mypy never ran at all — the worst of both worlds.
#
# ACCEPTED TRADEOFF: push is scoped to master rather than left unrestricted, so a same-repo
# PR runs the suite once (for the PR) instead of twice (branch push + PR). The cost is that
# a feature-branch push with no PR open gets no CI. That is deliberate — every path that can
# reach master is still gated (direct master push, or PR), and this repo's actual workflow is
# committing to master. If branch-before-PR feedback is ever wanted, drop the `branches:`
# filter and accept the duplicate runs.
on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

# lint/test runs are safely cancellable (unlike deploy-migrate's mid-flight DDL,
# which must finish once started) -- cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint (ruff check)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 (v4)

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2 (v5)
        with:
          python-version: "3.12"

      - name: Install deps (all groups)
        # --locked asserts uv.lock matches pyproject.toml instead of silently
        # re-resolving -- a stale lockfile fails the job rather than merging green.
        run: uv sync --locked

      - name: Run ruff check
        run: uv run ruff check .

  test:
    name: "Test suite (hermetic)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 (v4)

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2 (v5)
        with:
          python-version: "3.12"

      - name: Install deps (all groups)
        # --locked asserts uv.lock matches pyproject.toml instead of silently
        # re-resolving -- a stale lockfile fails the job rather than merging green.
        run: uv sync --locked

      # tests/test_pdf.py shells out to `pdftotext` (poppler-utils) to assert real
      # extracted text from a generated paystub. Present on macOS dev machines but not
      # on ubuntu-latest -- a runner-provided OS package, not an application dependency,
      # so it is installed here rather than via uv/pyproject.toml.
      - name: Install poppler-utils (pdftotext, for tests/test_pdf.py)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      # No DATABASE_URL / ALLOW_DB_RESET / ALLOW_LIVE_LLM set -- tests/conftest.py's
      # two-factor guards skip DB/live-LLM tests hermetically without either var.
      - name: Run test suite
        run: uv run pytest -q

  typecheck:
    name: "Type check (mypy --strict)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 (v4)

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2 (v5)
        with:
          python-version: "3.12"

      - name: Install deps (all groups)
        run: uv sync --locked

      - name: Run mypy
        run: uv run mypy
