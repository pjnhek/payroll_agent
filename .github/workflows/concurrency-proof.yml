name: concurrency-proof

# These proofs are a PRE-merge gate: they run on pull requests as well as on push to
# master, so a PR cannot go green without a real database having executed them. That
# matters because they are the only tests in the repo that touch real Postgres â€” the
# rest of the suite mocks the DB, and a broken ON CONFLICT arbiter or a lost update is
# invisible to a mocked test by construction.
#
# Running on pull_request is safe from forks: the database is an ephemeral service
# container with hardcoded throwaway credentials (see env below) and this job reads no
# repository secrets, so there is nothing a fork PR could exfiltrate.
on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  proof:
    name: "Concurrency invariants proof (real Postgres)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait until Postgres accepts connections before any step runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Plain local Postgres â€” NOT a Supavisor pooler URL. prepare_threshold=None
      # in app/db/supabase.py is a harmless no-op against a vanilla server. The
      # container password is ephemeral/network-isolated, not a secret.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      ALLOW_DB_RESET: "1"
      ALLOW_UNSIGNED_FIXTURES: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install deps (all groups)
        run: uv sync
      - name: Apply schema to ephemeral Postgres
        # Non-destructive pre-flight â€” deliberately no --reset. The seeded_db fixture
        # (tests/conftest.py) is the SOLE owner of reset, behind its ALLOW_DB_RESET
        # two-factor guard. bootstrap() without --reset uses CREATE TABLE IF NOT EXISTS,
        # so on this empty ephemeral container it is a clean idempotent create. Adding
        # --reset here would put an unguarded drop outside that two-factor guard.
        run: uv run python -m app.db.bootstrap
      - name: Run the real-Postgres invariant proofs
        # This is the ONLY job in the repo with a real database, so it is the only
        # place a live-DB test can actually execute. Two things to know before
        # editing this step:
        #
        # 1. TEST FILES ARE SELECTED BY NAME. `-m integration` narrows to the live-DB
        #    tests, but the file list below is what pytest collects in the first place.
        #    A new live-DB test that is not added to this list will skip silently and
        #    forever, in every CI job, while looking perfectly healthy.
        #
        #    What the two proofs cover:
        #      - test_concurrency_proof.py: the atomicity invariants hold under genuine
        #        parallelism (no double-approval, no lost update, no duplicate run,
        #        no half-written state).
        #      - test_email_epoch_arbiter_integration.py: the outbound upsert's
        #        ON CONFLICT column list and the email_messages unique constraint stay
        #        in agreement, so a retriggered run APPENDS a new outbound row instead
        #        of overwriting the email it already sent.
        #
        #    Queue/durability proofs do NOT go in this by-name list. They carry
        #    @pytest.mark.queueproof and are collected by the step below, by MARKER
        #    rather than by filename â€” so a future durability proof, in any file,
        #    needs zero edits to this file. This list stays scoped to the two
        #    pre-existing proofs it already names.
        #
        # 2. THESE TESTS SELF-SKIP WITHOUT A DATABASE, so a green job only means
        #    something if nothing skipped. If DATABASE_URL or ALLOW_DB_RESET goes
        #    missing, or a fixture errors into a skip, every proof quietly opts out,
        #    pytest exits 0, and the job passes having proven nothing. The guard below
        #    reds the build on any skip, and also on the "nothing ran at all" variant.
        #    Note that "deselected" is a different word from "skipped" and is both
        #    expected and benign â€” the guard does not trip on it.
        shell: bash
        run: |
          set -o pipefail
          uv run pytest tests/test_concurrency_proof.py tests/test_email_epoch_arbiter_integration.py -m integration -v -rs 2>&1 | tee pytest-integration.log
          if grep -qE '[0-9]+ skipped' pytest-integration.log; then
            echo "A live-DB proof was skipped instead of executed. A skipped proof proves nothing." >&2
            echo "Check DATABASE_URL / ALLOW_DB_RESET and the module-level live-DB guards." >&2
            exit 1
          fi
          if ! grep -qE '[0-9]+ passed' pytest-integration.log; then
            echo "No integration test reported as passed â€” the file selection or the live-DB guard is broken." >&2
            exit 1
          fi
      - name: Run the queue durability proofs (real Postgres)
        # The queue/durability proof surface, collected by MARKER (`queueproof`)
        # instead of by filename. Any test anywhere under tests/ that carries
        # @pytest.mark.queueproof runs here automatically with ZERO further edits
        # to this file, no matter which file it lives in or when it was added.
        #
        # This step is intentionally NOT a widening of the step above. The step
        # above stays byte-identical to its prior form: 2 named files, `-m
        # integration`. Whole-suite `-m integration` collection is FORBIDDEN â€” 12
        # files under tests/ already carry an `integration` marker and only 2 of
        # them (the ones named above) run in CI today. Collecting the whole suite
        # would wake the other 10 dormant live-DB modules at once against this
        # SAME shared Postgres service, each hitting the destructive module-scope
        # reset in tests/conftest.py:74-93 â€” a large, unbudgeted, unrelated change
        # with no place here.
        # KNOWN, DELIBERATELY-UNFIXED GAP: those 10 modules
        # (test_atomic_persist, test_claim_status, test_dashboard, test_gateway,
        # test_ingest, test_persistence, test_seed_roundtrip, test_stuck_run_recovery,
        # test_threading, plus non-queueproof tests in test_webhook_dedup_race)
        # stay dormant in CI. Phase 19 promotes only the concurrent same-Svix
        # durability proof in test_webhook_dedup_race to this marker-selected gate;
        # the rest of that module remains outside the live-DB CI surface. The wider
        # pre-existing gap remains tracked in the roadmap backlog.
        #
        # Guards, mirroring the step above exactly:
        #   - `[0-9]+ skipped` â†’ red. A skipped durability proof proves nothing â€”
        #     identical rationale to the step above.
        #   - `[0-9]+ passed` â†’ red if absent. IMPORTANT â€” this guard is NOT what
        #     catches a whole-marker typo (e.g. `-m queueprooof`): with `set -o
        #     pipefail` in front of `tee`, a selection that collects ZERO tests
        #     exits pytest's own NO_TESTS_COLLECTED code (5), which already reds
        #     this step before the guard is even reached.
        #     The guard's REAL value is surviving a DISARMED pipeline: the single
        #     most common way a gate gets silently defanged is someone appending
        #     `|| true` to "unblock CI", or dropping `pipefail` â€” either one
        #     swallows pytest's exit code, and this log-content check is what
        #     still catches "the run produced no passing test for any reason"
        #     when that happens.
        #     STATED GAP THIS GUARD DOES NOT CLOSE: it cannot detect a typo'd
        #     marker on ONE newly-added test while the OTHER queueproof tests
        #     still pass â€” the log still says "N passed" and the new proof
        #     silently never ran. Nothing in CI closes that. What closes it is a
        #     check run at authoring time: `uv run pytest tests/ -m queueproof
        #     --collect-only -q` must list every test in the file just written.
        shell: bash
        run: |
          set -o pipefail
          uv run pytest tests/ -m queueproof -v -rs 2>&1 | tee pytest-queueproof.log
          if grep -qE '[0-9]+ skipped' pytest-queueproof.log; then
            echo "A queue durability proof was skipped instead of executed. A skipped proof proves nothing." >&2
            echo "Check DATABASE_URL / ALLOW_DB_RESET and the module-level live-DB guards." >&2
            exit 1
          fi
          if ! grep -qE '[0-9]+ passed' pytest-queueproof.log; then
            echo "No queueproof test reported as passed â€” the marker selection or the live-DB guard is broken." >&2
            exit 1
          fi
